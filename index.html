<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Sheet — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0e1016;
  --surface:#151822;
  --surface-2:#1c202c;
  --surface-3:#242938;
  --border:#2a2f3d;
  --border-soft:#20242f;
  --text:#e7e9ef;
  --text-dim:#8b90a3;
  --text-faint:#5b6072;
  --accent:#6c8cff;
  --accent-dim:#3a4a8a;
  --accent-soft:rgba(108,140,255,0.14);
  --amber:#ffb454;
  --danger:#ff6b6b;
  --success:#4ade80;
  --header-bg:#171b26;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
::-webkit-scrollbar{width:12px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:8px;border:3px solid var(--surface);}

/* ============ LOADING SCREEN ============ */
#loadingScreen{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .5s ease, visibility .5s ease;
}
#loadingScreen.hide{opacity:0;visibility:hidden;pointer-events:none;}
.load-mark{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),#9b6cff);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#0b0d13;
  box-shadow:0 0 0 0 rgba(108,140,255,.5);
  animation:pulseMark 1.6s ease-in-out infinite;
}
@keyframes pulseMark{
  0%{ box-shadow:0 0 0 0 rgba(108,140,255,.35); transform:scale(1); }
  50%{ box-shadow:0 0 0 14px rgba(108,140,255,0); transform:scale(1.04); }
  100%{ box-shadow:0 0 0 0 rgba(108,140,255,0); transform:scale(1); }
}
.load-title{
  font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:.3px;
}
.load-sub{font-size:12px;color:var(--text-faint);font-family:'DM Mono',monospace;letter-spacing:.5px;}
.load-bar-track{width:220px;height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden;}
.load-bar-fill{
  height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#9b6cff);border-radius:2px;
  transition:width .18s ease;
}

/* ============ TOP NAV ============ */
.topnav{
  display:flex;align-items:center;gap:20px;padding:14px 28px;
  background:var(--header-bg);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:40;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px;flex-shrink:0;
}
.logo .mark{
  width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#9b6cff);
  display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#0e1016;
}
.searchwrap{
  flex:1;max-width:420px;display:flex;align-items:center;gap:8px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;
}
.searchwrap svg{width:15px;height:15px;stroke:var(--text-faint);fill:none;stroke-width:2;flex-shrink:0;}
.searchwrap input{
  background:transparent;border:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:100%;
}
.searchwrap input:focus{outline:none;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.user-badge{
  width:32px;height:32px;border-radius:50%;background:var(--surface-3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--accent);
}

/* ---- Auth / sync UI ---- */
.sync-status{
  font-size:10.5px;font-family:'DM Mono',monospace;color:var(--text-faint);
  padding:5px 9px;border-radius:20px;display:none;align-items:center;gap:5px;white-space:nowrap;
}
.sync-status:not(:empty){display:flex;}
.sync-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text-faint);flex-shrink:0;}
.sync-status.syncing{color:var(--amber);background:rgba(255,180,84,.1);}
.sync-status.syncing::before{background:var(--amber);animation:pulseDot 1s infinite;}
.sync-status.ok{color:var(--success);background:rgba(74,222,128,.1);}
.sync-status.ok::before{background:var(--success);}
.sync-status.err{color:var(--danger);background:rgba(255,107,107,.1);}
.sync-status.err::before{background:var(--danger);}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.3;}}
.auth-area{display:flex;align-items:center;gap:10px;}
#signInBtn{line-height:0;}
.user-chip{display:none;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:20px;padding:4px 6px 4px 4px;}
.user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--surface-3);}
.user-chip span{font-size:12px;font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-chip .btn{padding:5px 10px;font-size:11.5px;}
.doc-cloud-badge{
  position:absolute;bottom:8px;right:8px;width:22px;height:22px;border-radius:6px;
  background:rgba(14,16,22,.75);backdrop-filter:blur(4px);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--accent);
}
.doc-cloud-badge svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}

/* ============ MAIN ============ */
.main{max-width:1180px;margin:0 auto;padding:36px 28px 80px;}
.section-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text);
  margin:0 0 16px;letter-spacing:.2px;
}
.section-title .count{color:var(--text-faint);font-weight:500;font-family:'DM Mono',monospace;font-size:11.5px;}

/* Template row */
.templates{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:16px;margin-bottom:44px;
}
.tpl-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;
  transition:border-color .15s ease, transform .15s ease;
}
.tpl-card:hover{border-color:var(--accent-dim);transform:translateY(-2px);}
.tpl-thumb{
  height:104px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  border-bottom:1px solid var(--border);
}
.tpl-thumb svg{width:34px;height:34px;stroke:var(--text-faint);fill:none;stroke-width:1.6;}
.tpl-card:hover .tpl-thumb svg{stroke:var(--accent);}
.tpl-thumb.blank{background:
    repeating-linear-gradient(0deg, var(--border-soft) 0 1px, transparent 1px 13px),
    repeating-linear-gradient(90deg, var(--border-soft) 0 1px, transparent 1px 30px),
    var(--surface-2);
}
.tpl-thumb.budget{background:linear-gradient(160deg,#1c2436,#151822);}
.tpl-thumb.invoice{background:linear-gradient(160deg,#241c36,#151822);}
.tpl-thumb.tracker{background:linear-gradient(160deg,#1c3628,#151822);}
.tpl-label{padding:10px 12px;font-size:12.5px;font-weight:500;color:var(--text);}
.tpl-label .tpl-desc{display:block;font-size:10.5px;color:var(--text-faint);margin-top:2px;font-weight:400;}

/* Recent grid */
.recent-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;
}
.doc-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;
  transition:border-color .15s ease, transform .15s ease;position:relative;
}
.doc-card:hover{border-color:var(--accent-dim);transform:translateY(-2px);}
.doc-thumb{
  height:118px;background:
    repeating-linear-gradient(0deg, var(--border-soft) 0 1px, transparent 1px 15px),
    repeating-linear-gradient(90deg, var(--border-soft) 0 1px, transparent 1px 32px),
    var(--surface-2);
  border-bottom:1px solid var(--border);position:relative;
}
.doc-thumb .accent-corner{
  position:absolute;top:0;left:0;width:38%;height:34%;background:var(--accent-soft);border-bottom:1px solid var(--accent-dim);border-right:1px solid var(--accent-dim);
}
.doc-info{padding:11px 13px 12px;}
.doc-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-meta{font-size:10.5px;color:var(--text-faint);margin-top:3px;font-family:'DM Mono',monospace;}
.doc-menu-btn{
  position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:6px;
  background:rgba(14,16,22,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;
  color:var(--text);cursor:pointer;border:1px solid var(--border);
}
.doc-card:hover .doc-menu-btn{display:flex;}
.doc-menu-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.doc-menu{
  position:absolute;top:38px;right:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  padding:5px;min-width:150px;box-shadow:0 14px 32px rgba(0,0,0,.5);z-index:60;display:none;
}
.doc-menu.show{display:block;}
.doc-menu-item{padding:7px 10px;font-size:12px;border-radius:5px;cursor:pointer;color:var(--text);}
.doc-menu-item:hover{background:var(--accent-soft);color:var(--accent);}
.doc-menu-item.danger:hover{background:rgba(255,107,107,.12);color:var(--danger);}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  padding:70px 20px;border:1px dashed var(--border);border-radius:14px;text-align:center;
}
.empty-state svg{width:40px;height:40px;stroke:var(--text-faint);fill:none;stroke-width:1.5;}
.empty-state h3{font-family:'Syne',sans-serif;font-size:15px;margin:0;color:var(--text);}
.empty-state p{font-size:12.5px;color:var(--text-dim);margin:0;max-width:280px;}

.btn{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;
}
.btn:hover{background:var(--surface-3);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0b0d13;font-weight:700;}
.btn.primary:hover{background:#7d9aff;}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;}
.btn.icon-only{padding:8px;}

/* Rename dialog */
.overlay{
  position:fixed;inset:0;background:rgba(6,7,10,.6);z-index:500;display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
.overlay.show{display:flex;}
.dialog{
  background:var(--surface-2);border:1px solid var(--border);border-radius:12px;
  padding:20px;width:320px;box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.dialog h3{margin:0 0 14px;font-family:'Syne',sans-serif;font-size:15px;}
.dialog input{
  width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:9px 10px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;
}
.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surface-3);border:1px solid var(--border);color:var(--text);
  padding:9px 16px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;
  transition:all .25s ease;z-index:600;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div class="load-mark">P</div>
  <div class="load-title">Pro Sheet</div>
  <div class="load-bar-track"><div class="load-bar-fill" id="loadBarFill"></div></div>
  <div class="load-sub" id="loadSub">LOADING WORKBOOKS…</div>
</div>

<!-- TOP NAV -->
<div class="topnav">
  <div class="logo"><div class="mark">P</div>Pro Sheet</div>
  <div class="searchwrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="searchInput" placeholder="Search your spreadsheets">
  </div>
  <div class="nav-right">
    <button class="btn primary" id="newBlankBtn">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New spreadsheet
    </button>
    <button class="btn icon-only" id="syncNowBtn" title="Sync now" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M21 2v6h-6M3 22v-6h6M3.5 8a8.5 8.5 0 0 1 14.9-3.5L21 8M20.5 16a8.5 8.5 0 0 1-14.9 3.5L3 16"/></svg>
    </button>
    <div id="syncStatus" class="sync-status"></div>
    <div class="auth-area" id="authArea">
      <div id="signInBtn"></div>
      <div class="user-chip" id="userChip">
        <img id="userAvatar" class="user-avatar" src="" alt="">
        <span id="userName"></span>
        <button class="btn" id="signOutBtn">Sign out</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="section-title">Start a new spreadsheet</div>
  <div class="templates" id="templates"></div>

  <div class="section-title">Recent spreadsheets <span class="count" id="recentCount"></span></div>
  <div class="recent-grid" id="recentGrid"></div>
</div>

<div class="overlay" id="dialogOverlay">
  <div class="dialog" id="dialogBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

const INDEX_KEY = "prosheet_documents_index";
const DOC_PREFIX = "prosheet_doc_";
const AUTH_KEY = "prosheet_auth";

/* ================= CLOUD SYNC CONFIG =================
   1. GOOGLE_CLIENT_ID is your OAuth 2.0 Web Client ID (from Google Cloud Console).
   2. APPS_SCRIPT_URL is the "Web app" URL you get after deploying the
      companion Code.gs script (Deploy > New deployment > Web app >
      Execute as: Me, Who has access: Anyone). Paste it below once deployed.
   Until APPS_SCRIPT_URL is set, sign-in still works but cloud sync is skipped. */
const GOOGLE_CLIENT_ID = "384904424093-j1a6kupjerhjufurpvur4hbik6k90bla.apps.googleusercontent.com";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9yx31d4-vTxy2Y8lIuJzELhS3h8Q4gLlihMkLiSfRY5P6OnF8Rnht91KngzW1sxml0g/exec";

/* ================= LOADING SCREEN ================= */
const loadBarFill = document.getElementById('loadBarFill');
const loadSub = document.getElementById('loadSub');
const stages = ["LOADING WORKBOOKS…","SYNCING RECENT FILES…","READY"];
let pct = 0;
const loadTimer = setInterval(()=>{
  pct += Math.random()*22 + 8;
  if(pct >= 100){ pct = 100; clearInterval(loadTimer); finishLoad(); }
  loadBarFill.style.width = pct + "%";
  loadSub.textContent = stages[Math.min(stages.length-1, Math.floor(pct/34))];
}, 160);
function finishLoad(){
  setTimeout(()=>{
    document.getElementById('loadingScreen').classList.add('hide');
  }, 220);
}

/* ================= HELPERS ================= */
function uid(){ return 'd_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function loadIndex(){ try{ return JSON.parse(localStorage.getItem(INDEX_KEY)) || []; }catch(e){ return []; } }
function saveIndex(list){ localStorage.setItem(INDEX_KEY, JSON.stringify(list)); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove('show'), 1800);
}
function relTime(ts){
  const diff = Date.now() - ts;
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if(m < 1) return "Just now";
  if(m < 60) return `Edited ${m}m ago`;
  if(h < 24) return `Edited ${h}h ago`;
  if(d < 7) return `Edited ${d}d ago`;
  return "Edited " + new Date(ts).toLocaleDateString();
}
function makeSheetSkeleton(){
  return { data:{}, colWidths:{}, rowHeights:{}, rows:100, merges:[], frozenRow:0, frozenCol:0 };
}
function setCell(sh, id, v, f){ sh.data[id] = {v, f:f||{}}; }

/* ================= GOOGLE AUTH ================= */
let authState = null; // {idToken, email, name, picture, exp}

function loadAuth(){
  try{
    const a = JSON.parse(localStorage.getItem(AUTH_KEY));
    if(a && a.exp && a.exp*1000 > Date.now()) return a;
  }catch(e){}
  return null;
}
function saveAuth(a){ localStorage.setItem(AUTH_KEY, JSON.stringify(a)); }
function clearAuth(){ localStorage.removeItem(AUTH_KEY); authState = null; }

function decodeJwt(token){
  try{
    const payload = token.split('.')[1];
    const decoded = decodeURIComponent(
      atob(payload.replace(/-/g,'+').replace(/_/g,'/'))
        .split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')
    );
    return JSON.parse(decoded);
  }catch(e){ return null; }
}

function handleCredentialResponse(resp){
  const payload = decodeJwt(resp.credential);
  if(!payload) return;
  authState = { idToken: resp.credential, email: payload.email, name: payload.name, picture: payload.picture, exp: payload.exp };
  saveAuth(authState);
  renderAuthUI();
  syncNowFlow();
}

function initGoogleAuth(){
  authState = loadAuth();
  renderAuthUI();
  if(!(window.google && window.google.accounts && window.google.accounts.id)){
    setTimeout(initGoogleAuth, 150);
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: false
  });
  if(!authState){
    google.accounts.id.renderButton(document.getElementById('signInBtn'), {
      theme:'filled_black', size:'medium', shape:'pill', text:'signin_with'
    });
  } else {
    syncNowFlow();
  }
}

function renderAuthUI(){
  const chip = document.getElementById('userChip');
  const signBtn = document.getElementById('signInBtn');
  const syncBtn = document.getElementById('syncNowBtn');
  if(authState){
    chip.style.display = 'flex';
    signBtn.style.display = 'none';
    syncBtn.style.display = 'inline-flex';
    document.getElementById('userAvatar').src = authState.picture || '';
    document.getElementById('userName').textContent = authState.name || authState.email || '';
  } else {
    chip.style.display = 'none';
    signBtn.style.display = 'block';
    syncBtn.style.display = 'none';
    setSyncStatus('', '');
  }
}

document.getElementById('signOutBtn').addEventListener('click', ()=>{
  clearAuth();
  renderAuthUI();
  if(window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
  renderRecent(document.getElementById('searchInput').value);
  showToast("Signed out");
});

document.getElementById('syncNowBtn').addEventListener('click', ()=>syncNowFlow());

function syncNowFlow(){
  if(!authState) return;
  setSyncStatus('syncing', 'Syncing…');
  fullCloudSync()
    .then(()=>setSyncStatus('ok', 'Synced'))
    .catch(err=>{
      setSyncStatus('err', backendConfigured() ? 'Sync failed' : 'Backend not set up');
      console.warn('Cloud sync error:', err.message);
    });
}

function setSyncStatus(state, text){
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + (state || '');
  el.textContent = text || '';
}

/* ================= CLOUD BACKEND (Apps Script + Google Sheets) ================= */
function backendConfigured(){
  return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('PASTE_') !== 0;
}

async function callBackend(action, data){
  if(!backendConfigured()) throw new Error('Apps Script backend URL not configured');
  if(!authState) throw new Error('Not signed in');
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    // text/plain avoids a CORS preflight against the Apps Script web app
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, idToken: authState.idToken, data: data || {} })
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Backend error');
  return json.result;
}

async function fullCloudSync(){
  const cloudList = await callBackend('list', {});
  const local = loadIndex();
  const byId = {};
  local.forEach(d => byId[d.id] = d);
  cloudList.forEach(cd=>{
    const ld = byId[cd.id];
    if(!ld){
      local.push({ id: cd.id, name: cd.name, createdAt: cd.createdAt, updatedAt: cd.updatedAt, cloud: true });
    } else {
      ld.cloud = true;
      if(cd.updatedAt > ld.updatedAt){ ld.name = cd.name; ld.updatedAt = cd.updatedAt; }
    }
  });
  saveIndex(local);
  renderRecent(document.getElementById('searchInput').value);
}

async function pushDocToCloud(id, name, createdAt, updatedAt){
  if(!authState || !backendConfigured()) return;
  try{
    setSyncStatus('syncing', 'Syncing…');
    const raw = localStorage.getItem(DOC_PREFIX + id) || '';
    await callBackend('save', { id, name, createdAt, updatedAt, json: raw });
    setSyncStatus('ok', 'Synced');
  }catch(e){
    setSyncStatus('err', 'Sync failed');
    console.warn('pushDocToCloud failed:', e.message);
  }
}

async function deleteDocFromCloud(id){
  if(!authState || !backendConfigured()) return;
  try{ await callBackend('delete', { id }); }catch(e){ console.warn('deleteDocFromCloud failed:', e.message); }
}

async function ensureDocDownloaded(id){
  if(localStorage.getItem(DOC_PREFIX + id)) return true;
  if(!authState || !backendConfigured()) return false;
  try{
    setSyncStatus('syncing', 'Downloading…');
    const result = await callBackend('get', { id });
    if(result && typeof result.json === 'string' && result.json){
      localStorage.setItem(DOC_PREFIX + id, result.json);
      setSyncStatus('ok', 'Synced');
      return true;
    }
  }catch(e){
    setSyncStatus('err', 'Download failed');
    console.warn('ensureDocDownloaded failed:', e.message);
  }
  return false;
}

function renderTemplates(){
  const wrap = document.getElementById('templates');
  wrap.innerHTML = TEMPLATES.map(t=>`
    <div class="tpl-card" data-tpl="${t.id}">
      <div class="tpl-thumb ${t.thumbClass}"><svg viewBox="0 0 24 24">${t.icon}</svg></div>
      <div class="tpl-label">${t.name}<span class="tpl-desc">${t.desc}</span></div>
    </div>
  `).join('');
  wrap.querySelectorAll('.tpl-card').forEach(card=>{
    card.addEventListener('click', ()=>createFromTemplate(card.dataset.tpl));
  });
}

function createFromTemplate(tplId){
  const tpl = TEMPLATES.find(t=>t.id===tplId) || TEMPLATES[0];
  const id = uid();
  const sheetData = tpl.build();
  const name = tpl.id==='blank' ? "Untitled spreadsheet" : tpl.name;
  const workbook = { sheets:{ "Sheet1": sheetData }, order:["Sheet1"], current:"Sheet1", filename:name };
  localStorage.setItem(DOC_PREFIX+id, JSON.stringify(workbook));
  const list = loadIndex();
  const now = Date.now();
  list.unshift({id, name, createdAt:now, updatedAt:now});
  saveIndex(list);
  pushDocToCloud(id, name, now, now);
  window.location.href = `prosheet.html?id=${id}`;
}
document.getElementById('newBlankBtn').onclick = ()=>createFromTemplate('blank');

/* ================= RECENT GRID ================= */
let openMenuId = null;
function renderRecent(filter){
  filter = (filter||"").trim().toLowerCase();
  const list = loadIndex().filter(d=>!filter || d.name.toLowerCase().includes(filter))
                           .sort((a,b)=>b.updatedAt-a.updatedAt);
  document.getElementById('recentCount').textContent = list.length ? `· ${list.length}` : '';
  const grid = document.getElementById('recentGrid');
  if(!list.length){
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 10v10"/></svg>
        <h3>No spreadsheets yet</h3>
        <p>Create a blank spreadsheet or start from a template above to see it here.</p>
      </div>`;
    return;
  }
  const cloudIcon = `<svg viewBox="0 0 24 24"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.6-1.7A4.5 4.5 0 0 0 6.5 19h11z"/></svg>`;
  grid.innerHTML = list.map(d=>`
    <div class="doc-card" data-id="${d.id}">
      <div class="doc-thumb">
        <div class="accent-corner"></div>
        ${d.cloud ? `<div class="doc-cloud-badge" title="Synced to Google Drive">${cloudIcon}</div>` : ''}
      </div>
      <div class="doc-menu-btn" data-menu="${d.id}">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
      </div>
      <div class="doc-menu" id="menu-${d.id}">
        <div class="doc-menu-item" data-act="rename" data-id="${d.id}">Rename</div>
        <div class="doc-menu-item" data-act="duplicate" data-id="${d.id}">Duplicate</div>
        <div class="doc-menu-item danger" data-act="delete" data-id="${d.id}">Delete</div>
      </div>
      <div class="doc-info">
        <div class="doc-name">${escapeHtml(d.name)}</div>
        <div class="doc-meta">${relTime(d.updatedAt)}</div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.doc-card').forEach(card=>{
    card.addEventListener('click', async (e)=>{
      if(e.target.closest('.doc-menu-btn') || e.target.closest('.doc-menu')) return;
      const id = card.dataset.id;
      if(localStorage.getItem(DOC_PREFIX+id)){
        window.location.href = `prosheet.html?id=${id}`;
        return;
      }
      const ok = await ensureDocDownloaded(id);
      if(ok){
        window.location.href = `prosheet.html?id=${id}`;
      } else {
        showToast("Couldn't load this spreadsheet from the cloud");
      }
    });
  });
  grid.querySelectorAll('.doc-menu-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = btn.dataset.menu;
      const menu = document.getElementById('menu-'+id);
      const isOpen = menu.classList.contains('show');
      closeAllDocMenus();
      if(!isOpen){ menu.classList.add('show'); openMenuId = id; }
    });
  });
  grid.querySelectorAll('.doc-menu-item').forEach(mi=>{
    mi.addEventListener('click', (e)=>{
      e.stopPropagation();
      handleDocAction(mi.dataset.act, mi.dataset.id);
      closeAllDocMenus();
    });
  });
}
function closeAllDocMenus(){ document.querySelectorAll('.doc-menu.show').forEach(m=>m.classList.remove('show')); openMenuId=null; }
document.addEventListener('click', closeAllDocMenus);
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function handleDocAction(act, id){
  const list = loadIndex();
  const doc = list.find(d=>d.id===id);
  if(!doc) return;
  if(act==='rename') openRenameDialog(doc);
  else if(act==='duplicate') duplicateDoc(doc);
  else if(act==='delete') openDeleteConfirm(doc);
}
async function duplicateDoc(doc){
  if(!localStorage.getItem(DOC_PREFIX+doc.id)) await ensureDocDownloaded(doc.id);
  const raw = localStorage.getItem(DOC_PREFIX+doc.id);
  const newId = uid();
  const newName = doc.name + " (copy)";
  if(raw){
    const wb = JSON.parse(raw);
    wb.filename = newName;
    localStorage.setItem(DOC_PREFIX+newId, JSON.stringify(wb));
  }
  const list = loadIndex();
  const now = Date.now();
  list.unshift({id:newId, name:newName, createdAt:now, updatedAt:now});
  saveIndex(list);
  pushDocToCloud(newId, newName, now, now);
  renderRecent(document.getElementById('searchInput').value);
  showToast("Duplicated");
}
function openRenameDialog(doc){
  showDialog(`
    <h3>Rename spreadsheet</h3>
    <input id="renameInput" value="${escapeHtml(doc.name)}">
    <div class="dialog-actions">
      <button class="btn" id="dlgCancel">Cancel</button>
      <button class="btn primary" id="dlgSave">Save</button>
    </div>
  `);
  const input = document.getElementById('renameInput');
  input.focus(); input.select();
  document.getElementById('dlgCancel').onclick = closeDialog;
  document.getElementById('dlgSave').onclick = ()=>{
    const newName = input.value.trim() || "Untitled spreadsheet";
    const list = loadIndex();
    const d = list.find(x=>x.id===doc.id);
    let now = Date.now();
    if(d){ d.name = newName; d.updatedAt = now; saveIndex(list); }
    const raw = localStorage.getItem(DOC_PREFIX+doc.id);
    if(raw){ const wb = JSON.parse(raw); wb.filename = newName; localStorage.setItem(DOC_PREFIX+doc.id, JSON.stringify(wb)); }
    pushDocToCloud(doc.id, newName, d ? d.createdAt : now, now);
    closeDialog(); renderRecent(document.getElementById('searchInput').value);
  };
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') document.getElementById('dlgSave').click(); });
}
function openDeleteConfirm(doc){
  showDialog(`
    <h3>Delete "${escapeHtml(doc.name)}"?</h3>
    <p style="font-size:12.5px;color:var(--text-dim);margin:0 0 4px;">This can't be undone.</p>
    <div class="dialog-actions">
      <button class="btn" id="dlgCancel">Cancel</button>
      <button class="btn" id="dlgDelete" style="color:var(--danger);border-color:#5a2e2e;">Delete</button>
    </div>
  `);
  document.getElementById('dlgCancel').onclick = closeDialog;
  document.getElementById('dlgDelete').onclick = ()=>{
    let list = loadIndex();
    list = list.filter(d=>d.id!==doc.id);
    saveIndex(list);
    localStorage.removeItem(DOC_PREFIX+doc.id);
    deleteDocFromCloud(doc.id);
    closeDialog(); renderRecent(document.getElementById('searchInput').value);
    showToast("Deleted");
  };
}
function showDialog(html){
  document.getElementById('dialogBox').innerHTML = html;
  document.getElementById('dialogOverlay').classList.add('show');
}
function closeDialog(){ document.getElementById('dialogOverlay').classList.remove('show'); }
document.getElementById('dialogOverlay').addEventListener('click', (e)=>{ if(e.target.id==='dialogOverlay') closeDialog(); });

document.getElementById('searchInput').addEventListener('input', (e)=>renderRecent(e.target.value));

/* ================= INIT ================= */
renderTemplates();
renderRecent();
initGoogleAuth();

})();
